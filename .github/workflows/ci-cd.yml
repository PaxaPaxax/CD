name: Python CI/CD Project

on: [push] # Запускать робота при каждом пуше в репозиторий

jobs:
  build:
    runs-on: ubuntu-latest # Робот будет работать на системе Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # Робот копирует твой код к себе

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Lint (flake8)
        run: |
          # Проверка стиля кода. Если есть лишние пробелы или плохие названия — тест упадет.
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Tests
        run: |
          # Запуск нашего теста
          python -m unittest discover

      - name: Build Docker Image
        run: |
          docker build -t my-python-app:latest .
          echo "Docker Image built successfully!"

        